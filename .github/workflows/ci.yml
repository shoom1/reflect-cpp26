name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    name: Build & test (Bloomberg Clang P2996 fork)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Pull the prebuilt P2996 image from GHCR. The :p2996-<short SHA>
    # tag is immutable and must match the ARG P2996_REF pin in
    # Dockerfile — bumping the P2996 ref is a coordinated change across
    # both files plus a workflow-dispatched rebuild of the "Build
    # clang-p2996 image" workflow. See Dockerfile for the full procedure.
    container:
      image: ghcr.io/${{ github.repository_owner }}/clang-p2996:p2996-9ffb96e3ce36
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
