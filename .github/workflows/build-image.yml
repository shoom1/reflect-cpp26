name: Build clang-p2996 image

# Manually triggered workflow that builds the Bloomberg Clang P2996
# fork from source and pushes the resulting image to GHCR. Run this
# once per P2996_REF bump (or whenever the Dockerfile changes); the
# normal CI workflow then pulls the prebuilt image.
#
# Trigger from the Actions tab → "Build clang-p2996 image" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      p2996_ref:
        description: "Bloomberg fork branch/tag to build (overrides Dockerfile default)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub-hosted runners ship with ~14 GB free; LLVM source +
      # build + image export easily exceeds that. Free ~25 GB by
      # removing preinstalled tooling we don't need.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Resolve the P2996 ref we'll actually build. Default: read the
      # pinned ARG P2996_REF from Dockerfile. Override: workflow input.
      # The resolved SHA drives the image tag so CI can pin to a
      # toolchain-versioned tag instead of :latest.
      - name: Resolve P2996 ref
        id: p2996
        run: |
          if [ -n "${{ inputs.p2996_ref }}" ]; then
            REF="${{ inputs.p2996_ref }}"
          else
            REF=$(grep -E '^ARG P2996_REF=' Dockerfile | head -1 | cut -d= -f2)
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "short=${REF:0:12}" >> "$GITHUB_OUTPUT"
          echo "Building with P2996_REF=$REF (tag suffix: ${REF:0:12})"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          # CI runners have ~7 GB RAM and 2 CPUs — default COMPILE_JOBS=2,
          # LINK_JOBS=1 fits comfortably. Override here if runners change.
          build-args: |
            P2996_REF=${{ steps.p2996.outputs.ref }}
          # :latest floats and is convenient for ad-hoc pulls.
          # :p2996-<short SHA> is the immutable tag CI pins to.
          tags: |
            ghcr.io/${{ github.repository_owner }}/clang-p2996:latest
            ghcr.io/${{ github.repository_owner }}/clang-p2996:p2996-${{ steps.p2996.outputs.short }}
