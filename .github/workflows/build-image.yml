name: Build clang-p2996 image

# Manually triggered workflow that builds the Bloomberg Clang P2996
# fork from source and pushes the resulting image to GHCR. Run this
# once per P2996_REF bump (or whenever the Dockerfile changes); the
# normal CI workflow then pulls the prebuilt image.
#
# Trigger from the Actions tab → "Build clang-p2996 image" → Run workflow.

on:
  workflow_dispatch:
    inputs:
      p2996_ref:
        description: "Bloomberg fork branch/tag to build (overrides Dockerfile default)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub-hosted runners ship with ~14 GB free; LLVM source +
      # build + image export easily exceeds that. Free ~25 GB by
      # removing preinstalled tooling we don't need.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/clang-p2996.Dockerfile
          push: true
          build-args: |
            ${{ inputs.p2996_ref != '' && format('P2996_REF={0}', inputs.p2996_ref) || '' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/clang-p2996:latest
            ghcr.io/${{ github.repository_owner }}/clang-p2996:${{ github.sha }}
